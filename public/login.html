<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Eco Traveller</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>.auth-card{max-width:440px;margin:0 auto;padding:40px}</style>
</head>
<body>
<div class="blob blob-blue"></div>
<div class="blob blob-green"></div>

<nav class="navbar"><div class="nav-inner">
  <a href="/" class="nav-logo"><span class="logo-icon">🌿</span> Eco Traveller</a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a><a href="/calculator.html" class="nav-link">Calculator</a>
    <a href="/community.html" class="nav-link">Community</a>
    <a href="/dashboard.html" class="nav-link">Dashboard</a>
  </div>
  <button class="mobile-menu-btn" onclick="document.querySelector('.nav-links').classList.toggle('show')">☰</button>
</div></nav>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 24px 40px">
<div class="glass-card auth-card">
  <div style="text-align:center;margin-bottom:32px">
    <div style="font-size:48px;margin-bottom:12px">🌿</div>
    <h1 style="font-size:28px;font-weight:800;margin-bottom:4px">Welcome Back</h1>
    <p class="text-muted">Continue your eco journey</p>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:24px">
    <button onclick="showLogin()" id="loginTab" class="btn btn-primary" style="flex:1">Login</button>
    <button onclick="showSignup()" id="signupTab" class="btn btn-outline" style="flex:1">Sign Up</button>
  </div>

  <form id="loginForm" style="display:flex;flex-direction:column;gap:16px">
    <div class="input-group"><label>Email</label><div class="input-wrap"><input type="email" id="loginEmail" placeholder="your@email.com" required></div></div>
    <div class="input-group"><label>Password</label><div class="input-wrap"><input type="password" id="loginPassword" placeholder="••••••••" required></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px"><label style="display:flex;align-items:center;gap:6px"><input type="checkbox"> Remember me</label><a href="#" class="link">Forgot password?</a></div>
    <button type="submit" class="btn btn-primary btn-lg btn-full">Login</button>
    <div style="text-align:center;font-size:13px;color:var(--text-muted)">or continue with</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <a href="/auth/google" class="btn btn-outline" style="font-size:13px">G Google</a>
      <button type="button" class="btn btn-outline" style="font-size:13px">📘 Facebook</button>
    </div>
  </form>

  <form id="signupForm" style="display:none;flex-direction:column;gap:16px">
    <div class="input-group"><label>Full Name</label><div class="input-wrap"><input type="text" id="signupName" placeholder="John Doe" required></div></div>
    <div class="input-group"><label>Email</label><div class="input-wrap"><input type="email" id="signupEmail" placeholder="your@email.com" required></div></div>
    <div class="input-group"><label>Password</label><div class="input-wrap"><input type="password" id="signupPassword" placeholder="••••••••" required></div></div>
    <div class="input-group"><label>Confirm Password</label><div class="input-wrap"><input type="password" id="signupConfirm" placeholder="••••••••" required></div></div>
    <label style="font-size:13px;display:flex;align-items:center;gap:6px"><input type="checkbox" required> I agree to <a href="#" class="link">Terms</a></label>
    <button type="submit" class="btn btn-primary btn-lg btn-full">Create Account</button>
  </form>
</div>
</div>

<script>
function showLogin(){document.getElementById('loginForm').style.display='flex';document.getElementById('signupForm').style.display='none';document.getElementById('loginTab').className='btn btn-primary';document.getElementById('signupTab').className='btn btn-outline';document.getElementById('loginTab').style.flex='1';document.getElementById('signupTab').style.flex='1'}
function showSignup(){document.getElementById('loginForm').style.display='none';document.getElementById('signupForm').style.display='flex';document.getElementById('signupTab').className='btn btn-primary';document.getElementById('loginTab').className='btn btn-outline';document.getElementById('loginTab').style.flex='1';document.getElementById('signupTab').style.flex='1'}

document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('loginEmail').value,password:document.getElementById('loginPassword').value})});const d=await r.json();if(r.ok){localStorage.setItem('user',JSON.stringify(d.user));alert('Login successful!');window.location.href='/'}else alert(d.error||'Login failed')}catch(e){alert('Login error')}
});

document.getElementById('signupForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const p=document.getElementById('signupPassword').value;
  if(p!==document.getElementById('signupConfirm').value){alert('Passwords do not match');return}
  try{const r=await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('signupName').value,email:document.getElementById('signupEmail').value,password:p})});const d=await r.json();if(r.ok){localStorage.setItem('user',JSON.stringify(d.user));alert('Account created!');window.location.href='/'}else alert(d.error||'Signup failed')}catch(e){alert('Signup error')}
});
</script>
</body>
</html>
